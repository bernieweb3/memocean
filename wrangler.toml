name = "memocean-mcp-server"
main = "apps/mcp-server/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "R2"
bucket_name = "memocean"

[[d1_databases]]
binding = "DB"
database_name = "memocean"
database_id = "0cd67a7d-e4f0-4b5c-96e4-3c8ee54a8907"

[[kv_namespaces]]
binding = "KV"
id = "8728d1f130a64fd689d06899e2104108"

[env.production]
workers_dev = false

[env.staging]
workers_dev = true

[env.dev]
workers_dev = true

# Secrets MUST be set via:
# wrangler secret put API_SECRET_KEY --env production
# wrangler secret put GROQ_API_KEY --env production
# DO NOT put secrets in [vars]
