name = "memocean-mcp-server"
main = "apps/mcp-server/src/index.ts"
compatibility_date = "2024-09-23"

[env.production]
workers_dev = false

[env.staging]
workers_dev = true

[env.dev]
workers_dev = true

# Bindings (example — adjust IDs)
[[env.production.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "memocean-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "memocean-prod"
database_id = "your-db-id"

[[env.production.kv_namespaces]]
binding = "KV"
id = "your-kv-id"

# Secrets MUST be set via:
# wrangler secret put API_SECRET_KEY --env production
# wrangler secret put GROQ_API_KEY --env production
# DO NOT put secrets in [vars]
